[graph]
all-features = true

[output]
feature-depth = 2

[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
]

confidence-threshold = 0.8

[bans]
multiple-versions = warn
wildcards = deny
highlight = "all"

[sources]
unknown-registry = deny
unknown-git = deny

allow-registry = ["https://github.com/rust-lang/crates.io-index"]